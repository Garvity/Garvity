      <stop offset="0%" stop-color="#a6f5c6"/>
      <stop offset="100%" stop-color="#1c4d33"/>
    </linearGradient>
    <linearGradient id="scanGrad-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39ff88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#39ff88" stop-opacity="0"/>
