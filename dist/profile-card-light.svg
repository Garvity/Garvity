    </linearGradient>
    <linearGradient id="scanGrad-light" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a6e3d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0a6e3d" stop-opacity="0.35"/>
