name: Refresh profile card

# Runs automatically on a schedule AND whenever you push a config change,
# so you never have to hand-edit numbers in the SVG yourself.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours — tighten to "*/30 * * * *" if you want it closer to real-time
  workflow_dispatch:          # lets you trigger a refresh manually from the Actions tab
  push:
    paths:
      - "config.json"
      - "generate.py"
      - "tests/test_generate.py"
      - "ascii_dark.txt"
      - "ascii_light.txt"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests --break-system-packages

      - name: Run generator tests
        run: python -m unittest discover -s tests -v

      - name: Generate updated card
        env:
          # PROFILE_TOKEN is an optional PAT for private repositories.
          # Python receives it under the standard GITHUB_TOKEN name.
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
        run: python generate.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A dist
          git diff --staged --quiet || git commit -m "chore: auto-refresh profile card [skip ci]"
          git push
